<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InternShannon</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f7f4;
        color: #171717;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px;
      }

      section {
        width: min(560px, 100%);
        border: 1px solid #d8d7d1;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 44px rgba(20, 20, 20, 0.08);
        padding: 28px;
      }

      h1 {
        font-size: 24px;
        font-weight: 650;
        letter-spacing: 0;
        margin: 0 0 18px;
      }

      dl {
        display: grid;
        gap: 12px;
        margin: 0;
      }

      .row {
        align-items: center;
        display: flex;
        justify-content: space-between;
        gap: 18px;
        border-top: 1px solid #ebeae6;
        padding-top: 12px;
      }

      dt {
        color: #5f5d57;
        font-size: 13px;
      }

      dd {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
      }

      .ok {
        color: #176b45;
      }

      .warn {
        color: #9a4f00;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #161616;
          color: #f1f1ee;
        }

        section {
          background: #20201e;
          border-color: #3b3a35;
          box-shadow: none;
        }

        .row {
          border-top-color: #34332f;
        }

        dt {
          color: #aaa69c;
        }

        .ok {
          color: #72d6a0;
        }

        .warn {
          color: #ffb45f;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>InternShannon</h1>
        <dl>
          <div class="row">
            <dt>Desktop</dt>
            <dd class="ok">Ready</dd>
          </div>
          <div class="row">
            <dt>Sidecar</dt>
            <dd id="sidecar-status" class="warn">Checking</dd>
          </div>
        </dl>
      </section>
    </main>
    <script>
      const statusEl = document.getElementById("sidecar-status");
      const gatewayUrl = "http://127.0.0.1:29653";

      fetch(`${gatewayUrl}/api/v1/health`)
        .then(response => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          statusEl.textContent = "Ready";
          statusEl.className = "ok";
        })
        .catch(() => {
          statusEl.textContent = "Starting";
          statusEl.className = "warn";
        });
    </script>
  </body>
</html>
