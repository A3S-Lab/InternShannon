name: Desktop Linux Package

on:
  workflow_dispatch:
    inputs:
      target:
        description: Rust/Tauri target triple.
        required: true
        default: x86_64-unknown-linux-gnu
      bundles:
        description: Tauri bundle type list. deb is the stable default; appimage is available for investigation.
        required: true
        default: deb
      node_runtime_version:
        description: Optional exact bundled Node.js version, for example v22.21.1. Empty uses latest Node 22.x.
        required: false
        default: ""
      skip_smoke:
        description: Skip standalone sidecar smoke test after packaging.
        type: boolean
        required: true
        default: false
      publish_draft_release:
        description: Upload the Linux package assets to a draft GitHub Release.
        type: boolean
        required: true
        default: false
      release_tag:
        description: Release tag to create/update when publish_draft_release is true. Defaults to desktop-linux-v<apps/desktop version>.
        required: false
        default: ""
  push:
    paths:
      - .github/workflows/desktop-linux-package.yml

permissions:
  contents: write

concurrency:
  group: desktop-linux-package-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  TAURI_TARGET: ${{ inputs.target || 'x86_64-unknown-linux-gnu' }}
  TAURI_BUNDLES: ${{ inputs.bundles || 'deb' }}
  TAURI_CLI_VERBOSITY: "1"
  INTERNSHANNON_NODE_MAJOR: "22"
  INTERNSHANNON_NODE_VERSION: ${{ inputs.node_runtime_version || '' }}
  SKIP_SMOKE: ${{ inputs.skip_smoke || 'false' }}

jobs:
  package-linux:
    name: Package Linux desktop app
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64 || true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TAURI_TARGET }}

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Cache bundled Node runtime downloads
        uses: actions/cache@v4
        with:
          path: apps/desktop/.cache/node-runtime
          key: desktop-node-runtime-${{ runner.os }}-${{ env.TAURI_TARGET }}-${{ env.INTERNSHANNON_NODE_VERSION || env.INTERNSHANNON_NODE_MAJOR }}
          restore-keys: |
            desktop-node-runtime-${{ runner.os }}-${{ env.TAURI_TARGET }}-
            desktop-node-runtime-${{ runner.os }}-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify desktop packaging scripts
        run: pnpm --filter @internshannon/desktop run doctor:test

      - name: Build Linux packages
        run: |
          extra_args=()
          if [[ "${SKIP_SMOKE}" == "true" ]]; then
            extra_args+=(--skip-smoke)
          fi

          pnpm --dir apps/desktop tauri:bundle -- \
            --target "${TAURI_TARGET}" \
            --bundles "${TAURI_BUNDLES}" \
            "${extra_args[@]}"

      - name: Collect Linux package assets
        run: |
          artifact_dir="artifacts/desktop-linux"
          mkdir -p "${artifact_dir}"

          roots=(
            "apps/desktop/src-tauri/target/${TAURI_TARGET}/release/bundle"
            "apps/desktop/src-tauri/target/release/bundle"
          )

          mapfile -d '' assets < <(
            for root in "${roots[@]}"; do
              [[ -d "${root}" ]] || continue
              find "${root}" -type f \( \
                -name "*.AppImage" -o \
                -name "*.deb" -o \
                -name "*.rpm" -o \
                -name "*.tar.gz" -o \
                -name "*.sig" -o \
                -name "latest.json" \
              \) -print0
            done | sort -z -u
          )

          if (( ${#assets[@]} == 0 )); then
            echo "No Linux package assets were found under src-tauri/target." >&2
            exit 1
          fi

          for asset in "${assets[@]}"; do
            cp -f "${asset}" "${artifact_dir}/"
          done

          printf '%s\n' "${assets[@]}" > "${artifact_dir}/asset-manifest.txt"
          find apps/desktop/src-tauri/target -maxdepth 8 -path "*/release/bundle/*" -print | sort > "${artifact_dir}/bundle-tree.txt"
          ls -lh "${artifact_dir}"

      - name: Upload Linux package artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-${{ env.TAURI_TARGET }}
          path: artifacts/desktop-linux/*
          if-no-files-found: error
          retention-days: 14

      - name: Upload draft release assets
        if: ${{ inputs.publish_draft_release == true }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./apps/desktop/package.json').version")"
          tag="${{ inputs.release_tag }}"
          if [[ -z "${tag//[[:space:]]/}" ]]; then
            tag="desktop-linux-v${version}"
          fi

          title="InternShannon Linux v${version}"
          if ! gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --draft \
              --title "${title}" \
              --notes "Draft Linux desktop package built by GitHub Actions run ${GITHUB_RUN_ID}."
          fi

          mapfile -t assets < <(find "artifacts/desktop-linux" -maxdepth 1 -type f ! -name "asset-manifest.txt" ! -name "bundle-tree.txt" | sort)
          if (( ${#assets[@]} == 0 )); then
            echo "No release assets found." >&2
            exit 1
          fi

          gh release upload "${tag}" --repo "${GITHUB_REPOSITORY}" --clobber "${assets[@]}"
